name: Build and Push to Private Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.NEXSOFT_REGISTRY_URL }}
          username: ${{ secrets.NEXSOFT_REGISTRY_USER }}
          password: ${{ secrets.NEXSOFT_REGISTRY_PASS }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Dockerfile
          push: true
          tags: ${{ secrets.NEXSOFT_REGISTRY_URL }}/${{ github.repository }}:latest
